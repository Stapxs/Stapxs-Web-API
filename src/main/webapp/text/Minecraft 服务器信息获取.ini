url:/MC-Sever/{address}/{type}
info:获取 Minecraft 服务器的原生返回 JSON，在 type 参数的可选项中，前两项均为 web 页面。<br>注意：由于 MC 服务器返回的 JSON 格式并不固定，示例返回仅做参考。
type:get
api-value-1:*/address/string/服务器地址（必须包含端口号）
api-value-2:-/type/string/返回形式/page/page+view+json
api-back-200:{+    "description":{+        "text":"Mohim Server"+    },+    "players":{+        "max":32,+        "online":0+},+    "version":{+        "name":"1.17.1",+        "protocol":756+    },+    "ping":0+}
api-back-500:{+    "status":500,+    "message":"Connection refused: connect"+}